  <main>
    <div class="container contact-section">
      <div class="contact-header">
        <h1>Get in Touch</h1>
        <p style="color: var(--color-on-surface-variant); font-size: 1.125rem;">I'm currently looking for new opportunities and my inbox is always open.</p>
      </div>

      <div class="contact-form-container">
        <form action="#">
          <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="shubhamta.singh.sunar@kavyaschool.edu.np" required title="Please use your student email">
          </div>
          <div class="form-group">
            <label for="message" class="form-label">Message</label>
            <textarea id="message" name="message" class="form-textarea" placeholder="How can I help you?" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary submit-btn">
            Send Message
            <span style="display: flex; align-items: center; margin-left: 8px;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polyline points="22 2 15 22 11 13 2 9 22 2"></polyline></svg></span>
          </button>
        </form>
      </div>
